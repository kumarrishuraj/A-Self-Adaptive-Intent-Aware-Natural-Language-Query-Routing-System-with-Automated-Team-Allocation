services:
  - type: web
    name: nlp-routing-backend
    env: python
    region: ohio
    plan: free # Can upgrade to starter if SBERT OOM occurs
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && gunicorn -w 1 --threads 1 --worker-class gthread --preload app:app"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: nlp-routing-db
          property: connectionString
      - key: OMP_NUM_THREADS
        value: "1"
      - key: MKL_NUM_THREADS
        value: "1"
      - key: OPENBLAS_NUM_THREADS
        value: "1"
      - key: VECLIB_MAXIMUM_THREADS
        value: "1"
      - key: NUMEXPR_NUM_THREADS
        value: "1"

databases:
  - name: nlp-routing-db
    databaseName: ticketflow
    user: ticketflow_user
    plan: free
